name: Deploy plugin to the GitHub release. It needs manual upload to Publishpress.com
on:
  release:
    types: [ published ]

  workflow_dispatch:
    inputs:
      tmate_enabled_pro:
        type: boolean
        description: 'Enable "tmate" for debugging'
        required: false
        default: false

jobs:
  code-check:
    name: Check the code
    uses: ./.github/workflows/code-check.yml
    secrets: inherit

  deploy-wp-org:
    name: Deploy the new tag
    needs: code-check
    runs-on: ubuntu-latest
    steps:
      - name: Install linux packages
        run: |
          sudo apt-get update
          sudo apt-get install -y iproute2

      - name: Setup tmate session for Debugging, if inputs.tmate_enabled_pro is true
        uses: mxschmitt/action-tmate@v3
        if: ${{ inputs.tmate_enabled_pro }}
        timeout-minutes: 10
        with:
          detached: true

      - name: Checkout code
        uses: actions/checkout@master

      - name: Show version of tools inside the dev-workspace
        run: |
          $GITHUB_WORKSPACE/dev-workspace/run composer info:versions

      - name: Prepare composer
        run: |
          $GITHUB_WORKSPACE/dev-workspace/run composer validate
          $GITHUB_WORKSPACE/dev-workspace/run composer install

      - name: Build the package using ./dev-workspace
        run: |
          $GITHUB_WORKSPACE/dev-workspace/run composer build

      - name: Get the plugin version number
        id: get-version
        run: echo "version=$($GITHUB_WORKSPACE/dev-workspace/run pversion)" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/dist/publishpress-future-pro-${{ steps.get-version.outputs.version }}.zip
